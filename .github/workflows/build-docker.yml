name: Build and Publish
on: [workflow_dispatch]

jobs:
  publish_back:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build -t rem4d/client-backend:latest --build-arg PROJECT=client-backend . --target backend
      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rem4d
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: push image
        run: docker push rem4d/client-backend:latest
  publish_front:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build -t rem4d/client-front:latest --build-arg PROJECT=client-front . --target frontend
      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rem4d
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: push image
        run: docker push rem4d/client-front:latest
