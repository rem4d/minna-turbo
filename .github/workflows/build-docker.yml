name: Build and Publish
on: [workflow_dispatch]

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build -t rem4d/client-backend:latest --build-arg PROJECT=client-backend . --target backend
      - name: push image to docker hub
        run: docker login -u rem4d -p ${{ secrets.DOCKER_HUB_TOKEN }}
          docker push rem4d/client-backend:latest
