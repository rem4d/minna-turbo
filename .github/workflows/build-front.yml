name: Build front
on:
  push:
    branches:
      - main
    paths:
      - apps/client-front/src/**

jobs:
  publish_front:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build -t rem4d/client-front:stage --build-arg PROJECT=client-front --build-arg VITE_API_SERVER=${{ secrets.VITE_API_SERVER }} . --target frontend
      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rem4d
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: push image
        run: docker push rem4d/client-front:stage
