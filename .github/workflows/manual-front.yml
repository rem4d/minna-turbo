name: Manual build front
on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to deploy"
        required: true
        default: "main"
        type: string

jobs:
  publish_front_manual:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: build image
        run: docker build -t rem4d/client-front:stage --build-arg PROJECT=client-front --build-arg VITE_ROLLBAR_API_TOKEN=${{ secrets.VITE_ROLLBAR_API_TOKEN}} . --target frontend
      - name: login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: rem4d
          password: ${{ secrets.DOCKER_HUB_TOKEN }}
      - name: push image
        run: docker push rem4d/client-front:stage
