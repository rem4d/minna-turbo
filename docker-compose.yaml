services:
  watchtower:
    image: containrrr/watchtower
    command: --label-enable --interval 30 --cleanup
    environment:
      - DOCKER_API_VERSION=1.44
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
  frontend:
    build:
      context: "./"
      target: frontend
      args:
        - PROJECT=client-front
        - VITE_API_SERVER=${VITE_API_SERVER}
        - VITE_ROLLBAR_API_TOKEN=${VITE_ROLLBAR_API_TOKEN}
    image: "rem4d/client-front:stage"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    container_name: frontend
    expose:
      - "3000"
    environment:
      - VITE_API_SERVER=${VITE_API_SERVER}
    stdin_open: true
    tty: true

  backend:
    build:
      context: "./"
      target: backend
      args:
        PROJECT: client-backend
    image: "rem4d/client-backend:stage"
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    container_name: backend
    depends_on:
      - redis_db
    expose:
      - "8000"
    environment:
      - PORT=8000
      - NODE_ENV=production
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}

  redis_db:
    image: redis:alpine
    expose:
      - "6379"
    # command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]

  nginx:
    image: nginx:alpine
    container_name: nginx
    depends_on:
      - frontend
      - backend
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - /etc/letsencrypt:/etc/letsencrypt:ro
