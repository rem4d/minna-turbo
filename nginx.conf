server {
    listen 80;
    server_name kbook2.ru;

    return 301 https://$host$request_uri;
}

server {
        listen 443 ssl http2;
        server_name kbook2.ru;

        ssl_certificate         /etc/letsencrypt/live/kbook2.ru/fullchain.pem;
        ssl_certificate_key     /etc/letsencrypt/live/kbook2.ru/privkey.pem;
        ssl_protocols           TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers             HIGH:!aNULL:!MD5;


        location / {
                # Instruct the client browser NOT to cache HTML files
                if ($request_uri ~* "(index\.html|\.html)$") {
                    add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
                    add_header Pragma "no-cache";
                    expires off;
                }

                # Bypass Nginx proxy cache for index.html if Nginx caching is enabled
                # $http_pragma is a common variable used to bypass cache (e.g., when a user presses Ctrl+F5)
                proxy_cache_bypass $http_pragma;

                proxy_set_header Host $host;

                proxy_pass http://frontend:3000;
        }

        location /api {
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                rewrite /api/(.*) /$1  break;

                proxy_pass http://backend:8000;
        }


}

